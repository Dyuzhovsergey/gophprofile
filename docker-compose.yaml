services:
  postgres:
    image: postgres:16-alpine
    container_name: gophprofile-postgres
    environment:
      POSTGRES_DB: gophprofile
      POSTGRES_USER: gophprofile
      POSTGRES_PASSWORD: gophprofile
    ports:
      - "5433:5432"
    volumes:
      - gophprofile_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gophprofile -d gophprofile"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: quay.io/minio/minio:latest
    container_name: gophprofile-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - gophprofile_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio-init:
    image: quay.io/minio/mc:latest
    container_name: gophprofile-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/avatars;
      exit 0;
      "

  rabbitmq:
    image: rabbitmq:3-management
    container_name: gophprofile-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - gophprofile_rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  gophprofile_postgres_data:
  gophprofile_minio_data:
  gophprofile_rabbitmq_data: