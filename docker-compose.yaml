services:
  postgres:
    image: postgres:16.10-alpine3.22
    container_name: gophprofile-postgres
    environment:
      POSTGRES_DB: gophprofile
      POSTGRES_USER: gophprofile
      POSTGRES_PASSWORD: gophprofile
    ports:
      - "5433:5432"
    volumes:
      - gophprofile_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gophprofile -d gophprofile"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.19.1
    container_name: gophprofile-postgres-exporter
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATA_SOURCE_URI: "postgres:5432/gophprofile?sslmode=disable"
      DATA_SOURCE_USER: "gophprofile"
      DATA_SOURCE_PASS: "gophprofile"
    ports:
      - "9187:9187"

  migrate:
    image: golang:1.25-alpine
    container_name: gophprofile-migrate
    working_dir: /app
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "
      apk add --no-cache git &&
      GOBIN=/usr/local/bin go install github.com/pressly/goose/v3/cmd/goose@latest &&
      goose -dir migrations postgres 'postgres://gophprofile:gophprofile@postgres:5432/gophprofile?sslmode=disable' up
      "

  minio:
    image: minio/minio:latest
    container_name: gophprofile-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_PROMETHEUS_AUTH_TYPE: public
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - gophprofile_minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "mc alias set local http://127.0.0.1:9000 minioadmin minioadmin >/dev/null 2>&1 && mc ready local"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s  

  minio-init:
    image: minio/mc:latest
    container_name: gophprofile-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do
        echo 'waiting for minio...';
        sleep 2;
      done;
      mc mb --ignore-existing local/avatars;
      exit 0;
      "

  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: gophprofile-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
      - "15692:15692"
    volumes:
      - gophprofile_rabbitmq_data:/var/lib/rabbitmq
      - ./deploy/rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  server:
    build:
      context: .
      dockerfile: docker/server.Dockerfile
    restart: unless-stopped
    container_name: gophprofile-server
    depends_on:
      migrate:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
      jaeger:
        condition: service_started  
    environment:
      GOPHPROFILE_SERVER_ADDRESS: ":8080"
      GOPHPROFILE_LOG_LEVEL: debug
      GOPHPROFILE_MAX_UPLOAD_SIZE_BYTES: "10485760"

      GOPHPROFILE_OTEL_ENABLED: "true"
      GOPHPROFILE_OTEL_EXPORTER_ENDPOINT: jaeger:4318
      GOPHPROFILE_SERVICE_NAME: gophprofile-server

      GOPHPROFILE_DATABASE_DSN: postgres://gophprofile:gophprofile@postgres:5432/gophprofile?sslmode=disable

      GOPHPROFILE_S3_ENDPOINT: http://minio:9000
      GOPHPROFILE_S3_REGION: us-east-1
      GOPHPROFILE_S3_ACCESS_KEY: minioadmin
      GOPHPROFILE_S3_SECRET_KEY: minioadmin
      GOPHPROFILE_S3_BUCKET: avatars
      GOPHPROFILE_S3_USE_PATH_STYLE: "true"

      GOPHPROFILE_RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      GOPHPROFILE_RABBITMQ_EXCHANGE: avatars.exchange
      GOPHPROFILE_RABBITMQ_UPLOAD_QUEUE: avatar.uploaded.queue
      GOPHPROFILE_RABBITMQ_UPLOAD_ROUTING_KEY: avatar.uploaded
      GOPHPROFILE_RABBITMQ_DELETE_QUEUE: avatar.deleted.queue
      GOPHPROFILE_RABBITMQ_DELETE_ROUTING_KEY: avatar.deleted
    ports:
      - "9090:8080"

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    restart: unless-stopped
    container_name: gophprofile-worker
    depends_on:
      migrate:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
      jaeger:
        condition: service_started  
    environment:
      GOPHPROFILE_LOG_LEVEL: debug
      GOPHPROFILE_WORKER_METRICS_ADDRESS: ":9091"

      GOPHPROFILE_OTEL_ENABLED: "true"
      GOPHPROFILE_OTEL_EXPORTER_ENDPOINT: jaeger:4318
      GOPHPROFILE_SERVICE_NAME: gophprofile-worker

      GOPHPROFILE_DATABASE_DSN: postgres://gophprofile:gophprofile@postgres:5432/gophprofile?sslmode=disable

      GOPHPROFILE_S3_ENDPOINT: http://minio:9000
      GOPHPROFILE_S3_REGION: us-east-1
      GOPHPROFILE_S3_ACCESS_KEY: minioadmin
      GOPHPROFILE_S3_SECRET_KEY: minioadmin
      GOPHPROFILE_S3_BUCKET: avatars
      GOPHPROFILE_S3_USE_PATH_STYLE: "true"

      GOPHPROFILE_RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      GOPHPROFILE_RABBITMQ_EXCHANGE: avatars.exchange
      GOPHPROFILE_RABBITMQ_UPLOAD_QUEUE: avatar.uploaded.queue
      GOPHPROFILE_RABBITMQ_UPLOAD_ROUTING_KEY: avatar.uploaded
      GOPHPROFILE_RABBITMQ_DELETE_QUEUE: avatar.deleted.queue
      GOPHPROFILE_RABBITMQ_DELETE_ROUTING_KEY: avatar.deleted
    ports:
      - "9091:9091"

  jaeger:
    image: jaegertracing/all-in-one:1.76.0
    container_name: gophprofile-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"      

  prometheus:
    image: prom/prometheus:latest
    container_name: gophprofile-prometheus
    restart: unless-stopped
    depends_on:
      server:
        condition: service_started
      worker:
        condition: service_started
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - gophprofile_prometheus_data:/prometheus
    ports:
      - "9092:9090" 

  loki:
    image: grafana/loki:2.9.8
    container_name: gophprofile-loki
    restart: unless-stopped
    command:
      - "-config.file=/etc/loki/loki-config.yml"
    volumes:
      - ./deploy/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - gophprofile_loki_data:/loki
    ports:
      - "3100:3100"

  promtail:
    image: grafana/promtail:2.9.8
    container_name: gophprofile-promtail
    restart: unless-stopped
    depends_on:
      loki:
        condition: service_started
    command:
      - "-config.file=/etc/promtail/promtail-config.yml"
    volumes:
      - ./deploy/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro

  grafana:
    image: grafana/grafana:latest
    container_name: gophprofile-grafana
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_started
      loki:
        condition: service_started
      jaeger:
        condition: service_started    
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - gophprofile_grafana_data:/var/lib/grafana
      - ./deploy/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./deploy/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"

volumes:
  gophprofile_postgres_data:
  gophprofile_minio_data:
  gophprofile_rabbitmq_data:
  gophprofile_prometheus_data:
  gophprofile_grafana_data:
  gophprofile_loki_data:
