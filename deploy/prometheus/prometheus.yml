global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "gophprofile-server"
    metrics_path: /metrics
    static_configs:
      - targets:
          - "server:8080"
        labels:
          service: "gophprofile-server"

  - job_name: "gophprofile-worker"
    metrics_path: /metrics
    static_configs:
      - targets:
          - "worker:9091"
        labels:
          service: "gophprofile-worker"
  - job_name: "rabbitmq"
    metrics_path: /metrics
    static_configs:
      - targets:
          - "rabbitmq:15692"
        labels:
          service: "rabbitmq"          

  - job_name: "rabbitmq-queues"
    metrics_path: /metrics/detailed
    params:
      family:
        - queue_coarse_metrics
        - queue_consumer_count
    static_configs:
      - targets:
          - "rabbitmq:15692"
        labels:
          service: "rabbitmq"          