global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "gophprofile-server"
    metrics_path: /metrics
    static_configs:
      - targets:
          - "server:8080"
        labels:
          service: "gophprofile-server"

  - job_name: "gophprofile-worker"
    metrics_path: /metrics
    static_configs:
      - targets:
          - "worker:9091"
        labels:
          service: "gophprofile-worker"