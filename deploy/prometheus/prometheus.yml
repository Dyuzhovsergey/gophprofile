global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "alertmanager:9093"

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: "gophprofile-server"
    metrics_path: /metrics
    static_configs:
      - targets:
          - "server:8080"
        labels:
          service: "gophprofile-server"

  - job_name: "gophprofile-worker"
    metrics_path: /metrics
    static_configs:
      - targets:
          - "worker:9091"
        labels:
          service: "gophprofile-worker"

  - job_name: "rabbitmq"
    metrics_path: /metrics
    static_configs:
      - targets:
          - "rabbitmq:15692"
        labels:
          service: "rabbitmq"

  - job_name: "rabbitmq-queues"
    metrics_path: /metrics/detailed
    params:
      family:
        - queue_coarse_metrics
        - queue_consumer_count
    static_configs:
      - targets:
          - "rabbitmq:15692"
        labels:
          service: "rabbitmq"

  - job_name: "postgres"
    metrics_path: /metrics
    static_configs:
      - targets:
          - "postgres-exporter:9187"
        labels:
          service: "postgres"

  - job_name: "minio-cluster"
    metrics_path: /minio/v2/metrics/cluster
    scheme: http
    static_configs:
      - targets:
          - "minio:9000"
        labels:
          service: "minio"

  - job_name: "minio-bucket"
    metrics_path: /minio/v2/metrics/bucket
    scheme: http
    static_configs:
      - targets:
          - "minio:9000"
        labels:
          service: "minio"

  - job_name: "minio-node"
    metrics_path: /minio/v2/metrics/node
    scheme: http
    static_configs:
      - targets:
          - "minio:9000"
        labels:
          service: "minio"          