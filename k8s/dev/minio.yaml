apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gophprofile-minio-data
  namespace: gophprofile
  labels:
    app.kubernetes.io/name: gophprofile
    app.kubernetes.io/instance: gophprofile
    app.kubernetes.io/component: minio
    app.kubernetes.io/part-of: gophprofile
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gophprofile-minio
  namespace: gophprofile
  labels:
    app.kubernetes.io/name: gophprofile
    app.kubernetes.io/instance: gophprofile
    app.kubernetes.io/component: minio
    app.kubernetes.io/part-of: gophprofile
    app.kubernetes.io/managed-by: kubectl
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: gophprofile
      app.kubernetes.io/instance: gophprofile
      app.kubernetes.io/component: minio
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gophprofile
        app.kubernetes.io/instance: gophprofile
        app.kubernetes.io/component: minio
        app.kubernetes.io/part-of: gophprofile
    spec:
      containers:
        - name: minio
          image: minio/minio:latest
          imagePullPolicy: IfNotPresent
          args:
            - server
            - /data
            - --console-address
            - ":9001"
          ports:
            - name: api
              containerPort: 9000
              protocol: TCP
            - name: console
              containerPort: 9001
              protocol: TCP
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: gophprofile-secret
                  key: GOPHPROFILE_S3_ACCESS_KEY
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gophprofile-secret
                  key: GOPHPROFILE_S3_SECRET_KEY
          volumeMounts:
            - name: minio-data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: api
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: api
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 5
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "700m"
              memory: "768Mi"
      volumes:
        - name: minio-data
          persistentVolumeClaim:
            claimName: gophprofile-minio-data

---
apiVersion: v1
kind: Service
metadata:
  name: gophprofile-minio
  namespace: gophprofile
  labels:
    app.kubernetes.io/name: gophprofile
    app.kubernetes.io/instance: gophprofile
    app.kubernetes.io/component: minio
    app.kubernetes.io/part-of: gophprofile
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: gophprofile
    app.kubernetes.io/instance: gophprofile
    app.kubernetes.io/component: minio
  ports:
    - name: api
      port: 9000
      targetPort: api
      protocol: TCP
    - name: console
      port: 9001
      targetPort: console
      protocol: TCP

---
apiVersion: batch/v1
kind: Job
metadata:
  name: gophprofile-minio-init
  namespace: gophprofile
  labels:
    app.kubernetes.io/name: gophprofile
    app.kubernetes.io/instance: gophprofile
    app.kubernetes.io/component: minio-init
    app.kubernetes.io/part-of: gophprofile
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gophprofile
        app.kubernetes.io/instance: gophprofile
        app.kubernetes.io/component: minio-init
        app.kubernetes.io/part-of: gophprofile
    spec:
      restartPolicy: OnFailure
      containers:
        - name: minio-init
          image: minio/mc:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: gophprofile-secret
                  key: GOPHPROFILE_S3_ACCESS_KEY
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gophprofile-secret
                  key: GOPHPROFILE_S3_SECRET_KEY
            - name: GOPHPROFILE_S3_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: gophprofile-config
                  key: GOPHPROFILE_S3_BUCKET
          command:
            - sh
            - -c
            - |
              until mc alias set local http://gophprofile-minio:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"; do
                echo "waiting for minio..."
                sleep 2
              done

              mc mb --ignore-existing "local/$GOPHPROFILE_S3_BUCKET"
              echo "bucket $GOPHPROFILE_S3_BUCKET is ready"