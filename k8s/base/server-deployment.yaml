apiVersion: apps/v1
kind: Deployment
metadata:
  name: gophprofile-server
  namespace: gophprofile
  labels:
    app.kubernetes.io/name: gophprofile
    app.kubernetes.io/instance: gophprofile
    app.kubernetes.io/component: server
    app.kubernetes.io/part-of: gophprofile
    app.kubernetes.io/managed-by: kubectl
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: gophprofile
      app.kubernetes.io/instance: gophprofile
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gophprofile
        app.kubernetes.io/instance: gophprofile
        app.kubernetes.io/component: server
        app.kubernetes.io/part-of: gophprofile
    spec:
      serviceAccountName: gophprofile-app
      automountServiceAccountToken: false
      containers:
        - name: server
          image: docker.io/library/gophprofile-server:local
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: GOPHPROFILE_SERVICE_NAME
              value: "gophprofile-server"
          envFrom:
            - configMapRef:
                name: gophprofile-config
            - secretRef:
                name: gophprofile-secret
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          startupProbe:
            httpGet:
              path: /live
              port: http
            periodSeconds: 2
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /live
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3


            