apiVersion: batch/v1
kind: Job
metadata:
  name: gophprofile-migrations
  namespace: gophprofile
  labels:
    app.kubernetes.io/name: gophprofile
    app.kubernetes.io/instance: gophprofile
    app.kubernetes.io/component: migrations
    app.kubernetes.io/part-of: gophprofile
    app.kubernetes.io/managed-by: kubectl
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gophprofile
        app.kubernetes.io/instance: gophprofile
        app.kubernetes.io/component: migrations
        app.kubernetes.io/part-of: gophprofile
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: docker.io/library/gophprofile-migrate:local
          imagePullPolicy: Never
          env:
            - name: GOPHPROFILE_DATABASE_DSN
              valueFrom:
                secretKeyRef:
                  name: gophprofile-secret
                  key: GOPHPROFILE_DATABASE_DSN
            - name: GOPHPROFILE_MIGRATIONS_DIR
              value: "/app/migrations"
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"